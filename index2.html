<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero con texto centrado</title>
    <link rel="stylesheet" href="styles2.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>Mi Web</h1>
</header>

<!-- HERO (IMAGEN + TEXTO ENCIMA) -->
<section class="hero">

    <!-- IMAGEN -->
    <img src="https://picsum.photos/1200/400" alt="banner">

    <!-- TEXTO ENCIMA -->
    <div class="hero-text">
        <h2>Bienvenido</h2>
        <p>Diseño con texto centrado sobre la imagen</p>
    </div>

</section>

</body>
</html>
