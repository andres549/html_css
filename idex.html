<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <!-- Logo -->
    <h1 class="logo">WEBSITE</h1>

    <!-- Navegación -->
    <nav class="nav">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">LINK 1</a></li>
            <li><a href="#">LINK 2</a></li>
            <li><a href="#">LINK 3</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </nav>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
    <img src="https://picsum.photos/1200/300" alt="banner">
</section>

<!-- ================= BODY ================= -->
<section class="container">

    <!-- LADO IZQUIERDO -->
    <aside class="left">

        <div class="card small">
            <p>Publicidad</p>
        </div>

        <div class="social">
            <span>FB</span>
            <span>IG</span>
            <span>TW</span>
        </div>

        <div class="card small">
            <p>Contenido pequeño</p>
        </div>

    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main">

        <h2>Lorem ipsum dolor</h2>

        <p>
            Este es el contenido principal. Aquí va el texto más importante.
            Se usa <strong>main</strong> porque es lo central de la página.
        </p>

        <button>READ MORE</button>

    </main>

    <!-- IMAGEN DERECHA -->
    <div class="right">
        <img src="https://picsum.photos/400/300" alt="imagen">
    </div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">

    <div class="footer-links">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
    </div>

    <p>Website © 2026</p>

</footer>

</body>
</html>
